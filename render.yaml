databases:
  - name: repo1-db
    databaseName: repo1
    user: repo1_user
    plan: free
    region: singapore

services:
  - type: web
    name: impact-tracker-web
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repo1-db
          property: connectionString
